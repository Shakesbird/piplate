<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#F7F3EB" />
    <title>PiPlate Update reparieren</title>
    <style>
      :root { color-scheme: light; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      * { box-sizing: border-box; }
      body { margin: 0; min-height: 100dvh; display: grid; place-items: center; padding: max(1.25rem, env(safe-area-inset-top)) 1.25rem max(1.25rem, env(safe-area-inset-bottom)); background: #f7f3eb; color: #2d2a26; }
      main { width: min(100%, 30rem); border: 1px solid #ded8cd; border-radius: 2rem; background: #fffdf8; padding: 1.5rem; box-shadow: 0 22px 70px rgba(45, 42, 38, 0.12); }
      .mark { width: 3.25rem; height: 3.25rem; display: grid; place-items: center; border-radius: 1rem; background: #d95d39; color: white; font: 600 1.6rem Georgia, serif; }
      h1 { margin: 1.25rem 0 0; font: 600 clamp(2rem, 9vw, 3rem)/1.05 Georgia, serif; }
      p { margin: 0.85rem 0 0; color: #756e64; line-height: 1.55; }
      button { width: 100%; min-height: 3.25rem; margin-top: 1.5rem; border: 0; border-radius: 999px; background: #2d2a26; color: white; padding: 0.8rem 1.25rem; font: 700 1rem system-ui, sans-serif; }
      button:disabled { opacity: 0.6; }
      #status { min-height: 1.5rem; font-weight: 600; color: #526647; }
      .note { font-size: 0.85rem; }
    </style>
  </head>
  <body>
    <main>
      <div class="mark" aria-hidden="true">P</div>
      <h1>PiPlate reparieren</h1>
      <p>Setzt nur den festhängenden App-Cache zurück. Rezepte, Wochenplan und Anmeldung bleiben auf diesem Gerät erhalten.</p>
      <button id="repair" type="button">Update jetzt reparieren</button>
      <p id="status" role="status" aria-live="polite"></p>
      <p class="note">PiPlate öffnet sich anschließend automatisch neu.</p>
    </main>
    <script>
      const button = document.getElementById('repair');
      const status = document.getElementById('status');

      button.addEventListener('click', async () => {
        button.disabled = true;
        button.textContent = 'Reparatur läuft…';
        status.textContent = 'Der Update-Cache wird sicher erneuert.';

        try {
          if ('serviceWorker' in navigator) {
            const registrations = await navigator.serviceWorker.getRegistrations();
            const appPath = new URL('./', window.location.href).pathname;
            await Promise.all(registrations
              .filter(registration => new URL(registration.scope).pathname.startsWith(appPath))
              .map(registration => registration.unregister()));
          }

          if ('caches' in window) {
            const cacheNames = await caches.keys();
            await Promise.all(cacheNames
              .filter(cacheName => cacheName.startsWith('piplate-'))
              .map(cacheName => caches.delete(cacheName)));
          }

          status.textContent = 'Fertig. PiPlate wird neu geöffnet.';
          window.setTimeout(() => window.location.replace(`./?repaired=${Date.now()}`), 500);
        } catch (error) {
          console.error('PiPlate update repair failed:', error);
          button.disabled = false;
          button.textContent = 'Erneut versuchen';
          status.textContent = 'Die Reparatur konnte nicht abgeschlossen werden. Bitte erneut versuchen.';
        }
      });
    </script>
  </body>
</html>
