<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#F7F3EB" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="PiPlate" />
    <meta name="description" content="Your recipes and weekly meal plan, available offline." />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" type="image/png" sizes="192x192" href="./icons/piplate-192.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="./icons/piplate-192.png" />
    <title>PiPlate</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,500;9..144,600&display=swap" rel="stylesheet">
    <style>
      :root {
        color-scheme: light;
        font-family: 'DM Sans', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #F7F3EB;
      }

      * {
        box-sizing: border-box;
      }

      html, body, #root {
        width: 100%;
        height: 100%;
        margin: 0;
      }

      body {
        -webkit-tap-highlight-color: transparent;
        background-color: #F7F3EB;
        overflow: hidden;
        touch-action: manipulation;
        text-rendering: optimizeLegibility;
        -webkit-font-smoothing: antialiased;
      }

      button, input, textarea {
        font: inherit;
      }

      button {
        -webkit-tap-highlight-color: transparent;
      }

      .font-display,
      .display-title {
        font-family: 'Fraunces', Georgia, serif;
      }

      .app-container {
        width: min(100% - 2rem, 1280px);
        margin-inline: auto;
      }

      .display-title {
        font-size: clamp(2.6rem, 7vw, 5rem);
        line-height: 0.98;
        letter-spacing: -0.045em;
        color: #2D2A26;
      }

      .eyebrow {
        margin: 0;
        color: #9A6A56;
        font-size: 0.68rem;
        font-weight: 700;
        letter-spacing: 0.19em;
        text-transform: uppercase;
      }

      .filter-chip {
        flex: 0 0 auto;
        height: 2.25rem;
        display: inline-flex;
        align-items: center;
        padding-inline: 0.9rem;
        border: 1px solid #DED8CD;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.62);
        color: #756E64;
        font-size: 0.75rem;
        font-weight: 600;
        white-space: nowrap;
      }

      .desktop-nav {
        min-height: 2.5rem;
        padding-inline: 1.15rem;
        border-radius: 999px;
        color: #756E64;
        font-size: 0.84rem;
        font-weight: 600;
        transition: 160ms ease;
      }

      .desktop-nav-active {
        background: #FFFDF8;
        color: #2D2A26;
        box-shadow: 0 3px 14px rgba(45, 42, 38, 0.08);
      }

      .touch-button {
        width: 2.75rem;
        height: 2.75rem;
        min-width: 2.75rem;
        display: grid;
        place-items: center;
        border-radius: 999px;
        transition: transform 120ms ease;
      }

      .touch-button:active {
        transform: scale(0.9);
      }

      .stat-card {
        min-height: 4.4rem;
        display: flex;
        align-items: center;
        gap: 0.75rem;
        padding: 0.75rem;
        border: 1px solid #E8E1D6;
        border-radius: 1rem;
        background: #F7F3EB;
      }

      .stat-label {
        display: block;
        margin-bottom: 0.18rem;
        color: #958D80;
        font-size: 0.6rem;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .stat-value {
        display: block;
        color: #2D2A26;
        font-size: 0.95rem;
        font-weight: 700;
      }

      .stat-input {
        width: 100%;
        max-width: 5rem;
        border: 0;
        border-bottom: 1px solid #CFC6B9;
        background: transparent;
        color: #2D2A26;
        font-weight: 700;
        outline: 0;
      }

      .mobile-nav {
        position: fixed;
        z-index: 80;
        left: 0.75rem;
        right: 0.75rem;
        bottom: max(0.75rem, env(safe-area-inset-bottom));
        height: 4.25rem;
        display: grid;
        grid-template-columns: 1fr 1fr 4.2rem 1fr;
        align-items: center;
        padding: 0.35rem;
        border: 1px solid rgba(255,255,255,0.75);
        border-radius: 1.5rem;
        background: rgba(255, 253, 248, 0.92);
        box-shadow: 0 18px 50px rgba(45,42,38,0.2);
        backdrop-filter: blur(20px);
      }

      .mobile-nav-item {
        height: 3.4rem;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 0.2rem;
        border-radius: 1rem;
        color: #958D80;
        font-size: 0.58rem;
        font-weight: 700;
      }

      .mobile-nav-active {
        color: #D95D39;
        background: #F8E9E4;
      }

      .mobile-add {
        width: 3.65rem;
        height: 3.65rem;
        margin-inline: auto;
        display: grid;
        place-items: center;
        border-radius: 1.2rem;
        background: #2D2A26;
        color: white;
        box-shadow: 0 10px 24px rgba(45,42,38,0.25);
        transition: transform 120ms ease;
      }

      .mobile-add:active {
        transform: scale(0.9);
      }

      .safe-top {
        padding-top: env(safe-area-inset-top);
      }

      .safe-bottom {
        padding-bottom: max(1.25rem, env(safe-area-inset-bottom));
      }

      .safe-content-bottom {
        padding-bottom: max(3rem, calc(env(safe-area-inset-bottom) + 1.5rem));
      }

      .no-scrollbar {
        scrollbar-width: none;
      }

      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }

      .text-shadow-sm {
        text-shadow: 0 2px 14px rgba(0, 0, 0, 0.22);
      }

      .hover-scrollbar {
        scrollbar-width: thin;
        scrollbar-color: rgba(31, 41, 55, 0.12) transparent;
        scrollbar-gutter: stable;
      }

      .hover-scrollbar::-webkit-scrollbar {
        width: 16px;
      }

      .hover-scrollbar::-webkit-scrollbar-track {
        background: transparent;
      }

      .hover-scrollbar::-webkit-scrollbar-thumb {
        background: rgba(31, 41, 55, 0.12);
        border: 4px solid transparent;
        background-clip: content-box;
        border-radius: 9999px;
        transition: background 120ms ease, border-width 120ms ease;
      }

      .hover-scrollbar::-webkit-scrollbar-thumb:hover {
        background: rgba(31, 41, 55, 0.42);
        border-width: 0;
      }

      @media (max-width: 767px) {
        input, textarea, select {
          font-size: 16px !important;
        }

        .hover-scrollbar {
          scrollbar-width: none;
        }

        .hover-scrollbar::-webkit-scrollbar {
          display: none;
        }
      }

      @media (min-width: 768px) {
        .app-container {
          width: min(100% - 4rem, 1280px);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          scroll-behavior: auto !important;
          animation-duration: 0.01ms !important;
          transition-duration: 0.01ms !important;
        }
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "@google/genai": "https://esm.sh/@google/genai@^1.41.0",
    "lucide-react": "https://esm.sh/lucide-react@^0.564.0",
    "dexie-react-hooks": "https://esm.sh/dexie-react-hooks@^4.2.0",
    "dexie": "https://esm.sh/dexie@^4.3.0",
    "vite": "https://esm.sh/vite@^7.3.1",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.4"
  }
}
</script>
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
